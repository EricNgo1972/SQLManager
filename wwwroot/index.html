<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPC SQL Database Manager</title>
    <style>
        :root {
            color-scheme: dark;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at 18% 12%, rgba(125, 211, 252, 0.22), transparent 24%),
                radial-gradient(circle at 82% 14%, rgba(59, 130, 246, 0.18), transparent 20%),
                radial-gradient(circle at 50% 100%, rgba(16, 185, 129, 0.08), transparent 30%),
                linear-gradient(180deg, #020617 0%, #0b1220 100%);
            color: #e5edf7;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            filter: blur(48px);
            opacity: 0.45;
            pointer-events: none;
        }

        body::before {
            width: 18rem;
            height: 18rem;
            background: rgba(56, 189, 248, 0.2);
            top: -4rem;
            left: -4rem;
        }

        body::after {
            width: 14rem;
            height: 14rem;
            background: rgba(14, 165, 233, 0.18);
            right: -3rem;
            bottom: -3rem;
        }

        .shell {
            position: relative;
            width: min(34rem, 100%);
            min-height: 24rem;
            display: grid;
            align-content: center;
            justify-items: center;
            gap: 0.5rem;
            padding: 2.25rem 2rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.07) 100%),
                linear-gradient(135deg, rgba(15, 23, 42, 0.62) 0%, rgba(15, 23, 42, 0.38) 100%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.18),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04),
                0 30px 80px rgba(2, 6, 23, 0.5);
            backdrop-filter: blur(26px) saturate(180%);
            -webkit-backdrop-filter: blur(26px) saturate(180%);
            text-align: center;
        }

        .shell::before {
            content: "";
            position: absolute;
            inset: 1px;
            border-radius: 29px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.02));
            opacity: 0.45;
            pointer-events: none;
        }

        .spinner {
            width: 3rem;
            height: 3rem;
            margin-bottom: 1rem;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.16);
            border-top-color: #7dd3fc;
            box-shadow: 0 0 28px rgba(125, 211, 252, 0.18);
            animation: spin 900ms linear infinite;
        }

        .eyebrow {
            margin: 0;
            color: #7dd3fc;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 3vw, 2.8rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            text-shadow: 0 1px 18px rgba(255, 255, 255, 0.08);
        }

        p {
            margin: 0.4rem 0 0;
            max-width: 26rem;
            color: #cbd5e1;
            line-height: 1.6;
        }

        a {
            color: #7dd3fc;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <div class="spinner" aria-hidden="true"></div>
        <p class="eyebrow">Internal Tool</p>
        <h1>SPC SQL Database Manager</h1>
        <p>Preparing the dashboard. If it does not open automatically, <a href="/dashboard">continue to dashboard</a>.</p>
    </main>
    <script>
        window.setTimeout(function () {
            window.location.replace('/dashboard');
        }, 150);
    </script>
</body>
</html>
